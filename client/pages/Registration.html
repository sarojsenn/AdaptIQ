<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | AdaptIQ Registration | Sign Up</title>
  <meta name="description" content="Create your AdaptIQ account today. Join our platform with secure registration, personalized experience, and access to innovative adaptive intelligence solutions." />
  <meta name="keywords" content="AdaptIQ, create account, sign up, registration, adaptive intelligence, user account, secure login" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Create Account | AdaptIQ Registration | Sign Up" />
  <meta property="og:description" content="Create your AdaptIQ account today. Join our platform with secure registration and access to innovative adaptive intelligence solutions." />
  
  <link href="../css/main.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jacques+Francois:wght@400&family=Playfair+Display:wght@400;700;800;900&family=Ruwudu:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .font-jacques { font-family: 'Jacques Francois', serif; }
    .font-playfair { font-family: 'Playfair Display', serif; }
    .font-ruwudu { font-family: 'Ruwudu', serif; }
    .brand-gradient {
      background: linear-gradient(to bottom, #82ff77, #4e9947);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .input-field {
      transition: all 0.3s ease;
    }
    
    .input-field:focus {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(130, 255, 119, 0.3);
    }
    
    .password-toggle {
      transition: all 0.2s ease;
    }
    
    .password-toggle:hover {
      background-color: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
    }
    
    .submit-btn {
      transition: all 0.3s ease;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }
    
    .submit-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <main class="flex justify-center items-center w-full min-h-screen bg-gradient-to-br from-[#5b3181] to-[#130a1b] px-4 py-8">
    <div class="w-full max-w-md bg-transparent">
      
      <!-- Brand Logo Section -->
      <header class="text-center mb-12 mt-16">
        <div class=" justify-center items-baseline mb-10 whitespace-nowrap">
          <span class="text-8xl md:text-9xl lg:text-10xl font-bold brand-gradient font-jacques">A</span>
          <span class="text-6xl md:text-7xl lg:text-8xl font-bold brand-gradient font-playfair">dapt</span>
          <span class="text-8xl md:text-9xl lg:text-10xl font-bold brand-gradient font-ruwudu">IQ</span>
        </div>
        <h1 class="text-2xl md:text-3xl lg:text-4xl font-medium text-[#e5e5e5] tracking-wide mb-8">Create Your Account</h1>
      </header>

      <!-- Registration Form -->
      <form class="w-full space-y-6">
        
        <!-- Full Name Field -->
        <div class="space-y-2">
          <label for="fullName" class="block text-sm md:text-base font-medium text-[#e5e5e5]">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName" 
            class="input-field w-full px-4 py-3 bg-white rounded-lg border-0 focus:outline-none focus:ring-2 focus:ring-[#82ff77] text-gray-900 placeholder-gray-500"
            placeholder="Enter your full name"
            required
          />
        </div>

        <!-- Email Address Field -->
        <div class="space-y-2">
          <label for="emailAddress" class="block text-sm md:text-base font-medium text-[#e5e5e5]">Email Address</label>
          <input 
            type="email" 
            id="emailAddress" 
            name="emailAddress" 
            class="input-field w-full px-4 py-3 bg-white rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#82ff77] focus:border-transparent text-gray-900 placeholder-gray-500"
            placeholder="Enter your email address"
            required
          />
        </div>

        <!-- Password Field -->
        <div class="space-y-2">
          <label for="password" class="block text-sm md:text-base font-medium text-[#e5e5e5]">Password</label>
          <div class="relative">
            <input 
              type="password" 
              id="password" 
              name="password" 
              class="input-field w-full px-4 py-3 pr-12 bg-white rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#82ff77] focus:border-transparent text-gray-900 placeholder-gray-500"
              placeholder="Enter your password"
              minlength="8"
              required
            />
            <button 
              type="button" 
              class="password-toggle absolute right-3 top-1/2 transform -translate-y-1/2 p-2 rounded-full hover:bg-gray-100" 
              onclick="togglePasswordVisibility('password')" 
              aria-label="Toggle password visibility"
            >
              <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password Field -->
        <div class="space-y-2">
          <label for="confirmPassword" class="block text-sm md:text-base font-medium text-[#e5e5e5]">Confirm Password</label>
          <div class="relative">
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword" 
              class="input-field w-full px-4 py-3 pr-12 bg-white rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#82ff77] focus:border-transparent text-gray-900 placeholder-gray-500"
              placeholder="Confirm your password"
              minlength="8"
              required
            />
            <button 
              type="button" 
              class="password-toggle absolute right-3 top-1/2 transform -translate-y-1/2 p-2 rounded-full hover:bg-gray-100" 
              onclick="togglePasswordVisibility('confirmPassword')" 
              aria-label="Toggle confirm password visibility"
            >
              <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Terms Agreement Checkbox -->
        <div class="flex items-start space-x-3 mt-8">
          <input 
            type="checkbox" 
            id="termsAgreement" 
            name="termsAgreement" 
            class="w-5 h-5 text-[#82ff77] bg-white border-2 border-gray-300 rounded focus:ring-[#82ff77] focus:ring-2 mt-0.5" 
            required 
          />
          <label for="termsAgreement" class="text-sm md:text-base font-medium text-[#e5e5e5] leading-relaxed">
            I agree to the <a href="#" class="text-[#82ff77] hover:underline hover:text-[#4e9947] transition-colors">Terms of Service</a> and <a href="#" class="text-[#82ff77] hover:underline hover:text-[#4e9947] transition-colors">Privacy Policy</a>
          </label>
        </div>

        <!-- Create Account Button -->
        <button 
          type="submit" 
          class="submit-btn w-full py-4 px-6 text-base md:text-lg font-semibold text-black bg-white border border-black rounded-lg mt-8 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-[#82ff77] focus:border-transparent"
        >
          Create Account
        </button>
      </form>

      <!-- Sign In Link -->
      <div class="text-center mt-6">
        <span class="text-sm md:text-base text-[#e5e5e5]">Already have an account? </span>
        <a href="SignIn.html" class="text-sm md:text-base text-[#82ff77] hover:text-[#4e9947] hover:underline transition-all duration-200 font-medium">Sign In</a>
      </div>
    </div>
  </main>

  <script>
    function togglePasswordVisibility(inputId) {
      const passwordInput = document.getElementById(inputId);
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
    }

    // Show loading state
    function showLoading(show) {
      const submitBtn = document.querySelector('button[type="submit"]');
      if (show) {
        submitBtn.innerHTML = '<div class="flex items-center justify-center"><div class="spinner-border animate-spin inline-block w-4 h-4 border-2 rounded-full border-white border-t-transparent"></div><span class="ml-2">Creating Account...</span></div>';
        submitBtn.disabled = true;
      } else {
        submitBtn.innerHTML = 'Create Account';
        submitBtn.disabled = false;
      }
    }

    // Show error message
    function showError(message) {
      // Remove existing error message
      const existingError = document.querySelector('.error-message');
      if (existingError) {
        existingError.remove();
      }

      // Create new error message
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-message bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4';
      errorDiv.textContent = message;
      
      const form = document.querySelector('form');
      form.insertBefore(errorDiv, form.firstChild);
      
      // Scroll to top to show error
      form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Show success message
    function showSuccess(message) {
      // Remove existing messages
      const existingError = document.querySelector('.error-message');
      if (existingError) {
        existingError.remove();
      }

      // Create success message
      const successDiv = document.createElement('div');
      successDiv.className = 'success-message bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-4';
      successDiv.textContent = message;
      
      const form = document.querySelector('form');
      form.insertBefore(successDiv, form.firstChild);
      
      // Scroll to top to show success
      form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Form validation and submission
    document.querySelector('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('emailAddress').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const termsAgreed = document.getElementById('termsAgreement').checked;
      
      // Basic validation
      if (!fullName || !email || !password || !confirmPassword) {
        showError('Please fill in all fields.');
        return;
      }
      
      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }
      
      if (!termsAgreed) {
        showError('Please agree to the Terms of Service and Privacy Policy.');
        return;
      }
      
      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError('Please enter a valid email address.');
        return;
      }
      
      // Password strength validation
      if (password.length < 8) {
        showError('Password must be at least 8 characters long.');
        return;
      }

      // Split full name into first and last name
      const nameParts = fullName.split(' ');
      const firstName = nameParts[0];
      const lastName = nameParts.slice(1).join(' ') || firstName;

      showLoading(true);

      // Debug logging
      console.log('Sending registration data:', { firstName, lastName, email, password: '***' });

      try {
        const response = await fetch('http://localhost:3000/api/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            firstName,
            lastName,
            email,
            password
          }),
        });

        console.log('Registration response status:', response.status);
        console.log('Registration response headers:', response.headers);

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        console.log('Registration response data:', data);

        if (data.success) {
          // Store user data for verification page
          localStorage.setItem('pendingUserId', data.userId);
          localStorage.setItem('pendingUserEmail', email);
          
          if (data.emailError) {
            showSuccess('Registration successful! However, there was an issue sending the verification email. Redirecting to verification page where you can resend the code...');
          } else {
            showSuccess('Registration successful! Please check your email for verification code. Redirecting...');
          }
          
          setTimeout(() => {
            window.location.href = 'http://localhost:3000/verify?userId=' + data.userId;
          }, 3000);
        } else {
          showError(data.message || 'Registration failed. Please try again.');
        }
      } catch (error) {
        console.error('Registration error:', error);
        showError('Network error. Please check your connection and try again.');
      } finally {
        showLoading(false);
      }
    });

    // Add loading spinner styles
    const style = document.createElement('style');
    style.textContent = `
      .spinner-border {
        animation: spinner-border .75s linear infinite;
      }
      
      @keyframes spinner-border {
        to {
          transform: rotate(360deg);
        }
      }
    `;
    document.head.appendChild(style);
  </script>
<script id="dhws-dataInjector" src="../public/dhws-data-injector.js"></script>
</body>
</html>
